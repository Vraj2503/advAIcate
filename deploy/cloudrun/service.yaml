apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: advaicate-backend
  annotations:
    run.googleapis.com/ingress: "all"
    run.googleapis.com/launch-stage: "BETA"
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cpu-boost: "true"
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 6
      timeoutSeconds: 300
      serviceAccountName: backend-runtime-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com
      containers:
      - image: YOUR_IMAGE_URL
        ports:
        - name: http1
          containerPort: 8000
        resources:
          limits:
            cpu: "1000m"
            memory: "1Gi"
        env:
        # These are fetched from Secret Manager at runtime
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              key: latest
              name: SUPABASE_URL
        - name: SUPABASE_ANON_KEY
          valueFrom:
            secretKeyRef:
              key: latest
              name: SUPABASE_ANON_KEY
        - name: SUPABASE_SERVICE_ROLE_KEY
          valueFrom:
            secretKeyRef:
              key: latest
              name: SUPABASE_SERVICE_ROLE_KEY
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              key: latest
              name: GROQ_API_KEY
        - name: ALLOWED_ORIGINS
          valueFrom:
            secretKeyRef:
              key: latest
              name: ALLOWED_ORIGINS
