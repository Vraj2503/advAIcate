apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  # Base64 encoded values are NOT required for stringData, K8s will encode them
  # Replace these with your actual Supabase credentials or use a secret management tool
  SUPABASE_URL: "your_supabase_url"
  SUPABASE_KEY: "your_supabase_anon_key"
  SUPABASE_SERVICE_ROLE_KEY: "your_supabase_service_role_key"
  DATABASE_URL: "your_supabase_postgres_connection_string"
  # Add any other required backend environment variables here (e.g., GROQ_API_KEY)
  GROQ_API_KEY: "your_groq_api_key"
